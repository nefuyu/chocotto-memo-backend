spring.application.name=memo

# MySQL Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/chocotto_memo?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Tokyo}
spring.datasource.username=${DB_USERNAME:memo}
spring.datasource.password=${DB_PASSWORD:memo}

# Mybatis Configuration
mybatis.mapper-locations=classpath:mappers/*.xml
mybatis.type-aliases-package=com.example.chocottomemolocal.memo.entity
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.cache-enabled=true