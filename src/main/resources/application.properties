spring.application.name=memo

# Server Configuration
server.port=${SERVER_PORT:8080}

# MySQL Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/chocotto_memo?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=utf8&serverTimezone=Asia/Tokyo}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:memo}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:memo}

# Mybatis Configuration
mybatis.mapper-locations=classpath:mappers/*.xml
mybatis.type-aliases-package=com.example.chocottomemolocal.memo.entity
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.cache-enabled=true